name: 单包测试-default-settings

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 安装完整依赖（必须）
      run: |
        sudo apt update -y
        sudo apt install -y \
        build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev python3 python3-distutils rsync \
        unzip zlib1g-dev file wget curl

    - name: 拉源码
      run: |
        git clone --depth=1 https://github.com/he-yu-qing/2512immortalwrt-mt798x -b 25.12-dev openwrt

    - name: feeds + 配置
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        make defconfig

    # 🔥 关键：先构建工具链（否则必炸）
    - name: 构建 tools（必须）
      run: |
        cd openwrt
        make tools/compile -j1 V=s

    - name: 构建 toolchain（必须）
      run: |
        cd openwrt
        make toolchain/compile -j1 V=s

    # 🎯 你的目标：只编这个包
    - name: 编译 default-settings
      run: |
        cd openwrt

        # 防止 host 污染（可选但推荐）
        rm -rf staging_dir/hostpkg stamp/.package_compile

        make package/emortal/default-settings/clean
        make package/emortal/default-settings/compile -j1 V=s 2>&1 | tee log.txt

    - name: 上传日志
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: openwrt/log.txt
